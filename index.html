<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FANTA SENSI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:#000;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQg84QY2_xsWTQVDW2OJwfIl_Y8tXsGvrFKEw&s');
    background-size:cover;
    background-position:center;
    filter:blur(8px);
    transform:scale(1.1);
}

.box{
    position:relative;
    z-index:2;
    width:340px;
    padding:25px;
    border-radius:20px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(6px);
    color:white;
    text-align:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#ffcc00;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:12px;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    font-size:15px;
}

button:hover{
    opacity:0.9;
}

#painel{
    display:none;
}

.status{
    margin-top:15px;
    color:#00ff88;
    font-weight:bold;
}

.resultado{
    margin-top:20px;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    text-align:left;
    line-height:32px;
    font-size:17px;
}

</style>
</head>
<body>

<div class="box">

    <div class="logo">
        FANTA SENSI
    </div>

    <!-- KEY -->

    <div id="login">

        <input type="text"
        id="key"
        placeholder="Digite sua key">

        <button onclick="verificarKey()">
            ENTRAR
        </button>

        <div class="status" id="status"></div>

    </div>

    <!-- PAINEL -->

    <div id="painel">

        <input type="text"
        id="celular"
        placeholder="Digite seu celular">

        <button onclick="gerarSensi()">
            GERAR SENSIBILIDADE
        </button>

        <div class="resultado" id="resultado"></div>

    </div>

</div>

<script>

const SUPABASE_URL =
"https://oalyokjoixouwywxfmtz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_kg2nublKacXnCFQWQaA0QA_jv1C_-Hp";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

function random(min,max){

    return Math.floor(
        Math.random() * (max - min + 1)
    ) + min;

}

async function verificarKey(){

    const key =
    document.getElementById("key").value;

    const { data, error } = await supabaseClient
    .from("keys")
    .select("*")
    .eq("key", key);

    if(error || data.length === 0){

        document.getElementById("status")
        .innerHTML = "❌ KEY INVÁLIDA";

        return;

    }

    document.getElementById("status")
    .innerHTML = "✅ KEY ATIVADA";

    document.getElementById("login")
    .style.display = "none";

    document.getElementById("painel")
    .style.display = "block";

}

function gerarSensi(){

    const celular =
    document.getElementById("celular").value.trim();

    if(celular.length < 4){

        alert("Digite um celular válido");
        return;

    }

    const marcas = [
        "samsung",
        "iphone",
        "xiaomi",
        "redmi",
        "poco",
        "motorola",
        "realme",
        "infinix",
        "asus",
        "lg"
    ];

    let valido = false;

    marcas.forEach(marca => {

        if(
            celular.toLowerCase().includes(marca)
        ){
            valido = true;
        }

    });

    if(!valido){

        alert("Digite um modelo de celular válido");
        return;

    }

    let dpi;

    if(celular.toLowerCase().includes("iphone")){

        dpi = random(550, 650);

    }else if(
        celular.toLowerCase().includes("xiaomi") ||
        celular.toLowerCase().includes("redmi") ||
        celular.toLowerCase().includes("poco")
    ){

        dpi = random(620, 780);

    }else{

        dpi = random(500, 700);

    }

    const geral = random(180, 200);
    const redDot = random(170, 195);
    const x2 = random(160, 185);
    const x4 = random(140, 175);
    const awm = random(30, 80);

    document.getElementById("resultado")
    .innerHTML = `

    📱 <b>Celular:</b> ${celular}<br>

    ⚡ <b>DPI:</b> ${dpi}<br>

    🎯 <b>Geral:</b> ${geral}<br>

    🔴 <b>Red Dot:</b> ${redDot}<br>

    🔭 <b>2x:</b> ${x2}<br>

    🎥 <b>4x:</b> ${x4}<br>

    💥 <b>AWM:</b> ${awm}

    `;

}
    `;

}

</script>

</body>
</html>
